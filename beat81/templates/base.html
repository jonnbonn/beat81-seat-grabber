<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Grabby — Beat81 spot grabber{% endblock %}</title>
  <link rel="icon" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/grabby.css">
  <link rel="stylesheet" href="/static/app.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
  {% if active_page != 'login' %}
  <header class="grb-header">
    <a href="/" class="grb-logo" aria-label="Grabby">
      <img src="/static/logo-wordmark.svg" alt="Grabby">
    </a>
    <nav class="grb-nav">
      <a href="/" class="{% if active_page == 'events' %}active{% endif %}">Classes</a>
      <a href="/bookings" class="{% if active_page == 'bookings' %}active{% endif %}">Watches &amp; bibs</a>
    </nav>
    <div class="grb-spacer"></div>
    <form method="post" action="/logout" class="inline">
      <button type="submit" class="btn btn-quiet">Log out</button>
    </form>
  </header>
  {% endif %}

  <main class="grb-main">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
