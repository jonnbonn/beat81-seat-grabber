services:
  beat81:
    build: .
    image: beat81-grabber:latest
    container_name: beat81-grabber
    restart: unless-stopped
    ports:
      - "${B81_PORT:-8000}:${B81_PORT:-8000}"
    environment:
      B81_EMAIL: ${B81_EMAIL:?set B81_EMAIL in .env}
      B81_PASSWORD: ${B81_PASSWORD:?set B81_PASSWORD in .env}
      B81_PORT: ${B81_PORT:-8000}
      B81_TIME_BEFORE_EVENT: ${B81_TIME_BEFORE_EVENT:-1800}
      B81_POLL_MIN_SECS: ${B81_POLL_MIN_SECS:-2}
      B81_POLL_MAX_SECS: ${B81_POLL_MAX_SECS:-5}
      B81_DEFAULT_CITY: ${B81_DEFAULT_CITY:-}
      B81_NTFY_TOPIC: ${B81_NTFY_TOPIC:-}
    volumes:
      - beat81-data:/data

volumes:
  beat81-data:
